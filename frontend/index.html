<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchPulse API - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f14; }
        .glass-panel { background: rgba(22, 27, 34, 0.6); backdrop-filter: blur(12px); }
        .active-sub-tab { background-color: #161b22; color: #10b981; border-color: rgba(16, 185, 129, 0.3); shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen pb-12 selection:bg-emerald-500 selection:text-black">

    <header class="border-b border-slate-800 bg-[#0f141c]/90 sticky top-0 z-50 backdrop-blur-md shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-emerald-500 text-slate-950 px-2.5 py-1 rounded font-black tracking-widest text-xs shadow-[0_0_20px_rgba(16,185,129,0.5)]">PULSE</div>
                <h1 class="text-sm font-mono font-bold tracking-wider text-white uppercase">PitchPulse <span class="text-emerald-400 text-xs lowercase">v2.0</span></h1>
            </div>
            <div id="status-api" class="text-[11px] font-mono text-slate-400 bg-[#161f28] border border-slate-800 px-3 py-1 rounded-sm">
                pinging_system...
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8 space-y-8">
        
        <section class="space-y-3">
            <div class="flex items-center space-x-2 font-mono text-xs tracking-widest uppercase text-slate-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span>
                <span>[ Ao Vivo ]</span>
            </div>
            <div id="container-ao-vivo" class="w-full">
                <div class="text-center py-8 glass-panel border border-slate-800/60 rounded-xl text-xs font-mono text-slate-500">
                    Aguardando sinal dos gramados...
                </div>
            </div>
        </section>

        <section class="glass-panel border border-slate-800/60 rounded-2xl overflow-hidden p-5 space-y-6 shadow-2xl">
            
            <div class="flex space-x-2 bg-[#090d12] p-1 rounded-xl border border-slate-800/40 max-w-md">
                <button data-aba="grupos" class="w-full py-2.5 text-xs font-mono tracking-wider uppercase rounded-lg text-slate-400 hover:text-white transition-all cursor-pointer border border-transparent">
                    Tabela
                </button>
                <button data-aba="confrontos" class="w-full py-2.5 text-xs font-mono tracking-wider uppercase rounded-lg text-slate-400 hover:text-white transition-all cursor-pointer border border-transparent">
                    Agenda
                </button>
                <button data-aba="chaveamento" class="w-full py-2.5 text-xs font-mono tracking-wider uppercase rounded-lg text-slate-400 hover:text-white transition-all cursor-pointer border border-transparent">
                    Chaveamento
                </button>
            </div>

            <div id="conteudo-principal" class="w-full min-h-[250px]">
                <div class="flex flex-col items-center justify-center pt-12 space-y-3 text-slate-500 text-xs font-mono">
                    <div class="w-4 h-4 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    <span>Carregando dados estruturados...</span>
                </div>
            </div>

        </section>

    </main>

<script src="./scripts/ao-vivo.js?v=3"></script>
    <script src="./scripts/grupos.js?v=3"></script>
    <script src="./scripts/confrontos.js?v=3"></script>
    <script src="./scripts/app.js?v=3"></script>
</body>
</html>
