<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchPulse - FIFA World Cup 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .header-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .nav-btn {
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background-color: #ddd;
            color: #333;
            transition: all 0.2s ease;
        }
        .nav-btn.active {
            background-color: #111;
            color: white;
        }
        .secao { display: none; max-width: 1000px; margin: 0 auto; }
        .secao.active { display: block; }
        
        .container-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            border-left: 5px solid #007bff;
        }
        .placar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }
        .gols { background: #eee; padding: 5px 10px; border-radius: 4px; }
        
        .grupo-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            padding: 15px;
        }
        .grupo-titulo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { color: #666; font-size: 12px; text-transform: uppercase; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #333;">PitchPulse - Painel da Copa</h1>

    <div class="header-nav">
        <button class="nav-btn active" onclick="alternarAbas('jogos')">Matches</button>
        <button class="nav-btn" onclick="alternarAbas('tabela')">Table</button>
    </div>

    <div id="aba-jogos" class="secao active">
        <div class="container-jogos" id="lista-partidas"></div>
    </div>

    <div id="aba-tabela" class="secao">
        <div id="grupos-classificacao"></div>
    </div>

    <script>
        function alternarAbas(aba) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));

            if (aba === 'jogos') {
                document.querySelector('button[onclick*="jogos"]').classList.add('active');
                document.getElementById('aba-jogos').classList.add('active');
            } else {
                document.querySelector('button[onclick*="tabela"]').classList.add('active');
                document.getElementById('aba-tabela').classList.add('active');
                carregarClassificacao();
            }
        }

        async function carregarPartidas() {
            const container = document.getElementById('lista-partidas');
            try {
                const response = await fetch('http://localhost:8000/partidas');
                const partidas = await response.json();
                container.innerHTML = '';

                partidas.forEach(jogo => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let badgeHTML = '';

                    // Lógica visual baseada nas melhorias que colocamos no backend
                    if (jogo.status_jogo === '3') {
                        // Se estiver AO VIVO (Simulador ativo)
                        card.style.borderLeft = '5px solid #dc3545';
                        card.style.background = '#fff5f5';
                        badgeHTML = `<span style="background: #dc3545; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 10px;">${jogo.status_texto}</span>`;
                    } else if (jogo.status_jogo === '0') {
                        // Se estiver finalizado (FT)
                        card.style.borderLeft = '5px solid #28a745';
                        badgeHTML = `<span style="background: #28a745; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 10px;">${jogo.status_texto}</span>`;
                    } else {
                        // Se o jogo não tiver começado, mostra a data formatada de cinza e borda azul padrão
                        card.style.borderLeft = '5px solid #007bff';
                        card.style.background = '#ffffff';
                        badgeHTML = `<span style="background: #6c757d; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 10px;">${jogo.status_texto}</span>`;
                    }

                    card.innerHTML = `
                        <div style="font-size:11px; color:#777; font-weight:bold;">JOGO ${jogo.numero_jogo} ${badgeHTML}</div>
                        <div class="placar">
                            <span>${jogo.time_casa}</span>
                            <span class="gols">${jogo.gols_casa} ${jogo.divisor} ${jogo.gols_fora}</span>
                            <span>${jogo.time_fora}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        async function carregarClassificacao() {
            const container = document.getElementById('grupos-classificacao');
            try {
                const response = await fetch('http://localhost:8000/classificacao');
                const readiness = await response.json();
                container.innerHTML = '';

                for (const [grupoNome, times] of Object.entries(readiness)) {
                    const grupoDiv = document.createElement('div');
                    grupoDiv.className = 'grupo-container';

                    let tableHtml = `
                        <div class="grupo-titulo">${grupoNome}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th class="text-center">P</th>
                                    <th class="text-center">J</th>
                                    <th class="text-center">V</th>
                                    <th class="text-center">SG</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    times.forEach((time, idx) => {
                        tableHtml += `
                            <tr>
                                <td><strong>${idx + 1}.</strong> ${time.time}</td>
                                <td class="text-center" style="font-weight:bold;">${time.pontos}</td>
                                <td class="text-center">${time.jogos}</td>
                                <td class="text-center">${time.vitorias}</td>
                                <td class="text-center">${time.sg}</td>
                            </tr>
                        `;
                    });

                    tableHtml += `</tbody></table>`;
                    grupoDiv.innerHTML = tableHtml;
                    container.appendChild(grupoDiv);
                }
            } catch (e) { console.error(e); }
        }

        carregarPartidas();
        setInterval(() => {
            carregarPartidas();
            if (document.getElementById('aba-tabela').classList.contains('active')) {
                carregarClassificacao();
            }
        }, 3000);
    </script>
</body>
</html>
