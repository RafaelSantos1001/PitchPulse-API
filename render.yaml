databases:
  - name: pitchpulse-db
    plan: free
    databaseName: placar_futebol
    user: pitchpulse

services:
  - type: web
    name: pitchpulse-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHONPATH
        value: /code
      - key: DATABASE_URL
        fromDatabase:
          name: pitchpulse-db
          property: connectionString
